services:
  postgres:
    image: postgres
    ports:
      - '54320:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: payload # THIS MUST MATCH YOUR DB NAME IN .env
      POSTGRES_HOST_AUTH_METHOD: trust
    env_file:
      - .env

  vercel-blob:
    image: ghcr.io/payloadcms/vercel-blob-emulator:latest
    ports:
      - '3100:3000'
    env_file:
      - .env
    environment:
      EMULATOR_BASE_URL: http://localhost:3100
    volumes:
      - vercel_blob_data:/data

volumes:
  vercel_blob_data:
