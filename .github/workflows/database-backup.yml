name: Database Backup

on:
  schedule:
    - cron: '0 3 */3 * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      POSTGRES_URL: ${{ secrets.POSTGRES_URL_NO_POOLING }}
      BACKUP_POSTGRES_URL: ${{ secrets.BACKUP_POSTGRES_URL_NO_POOLING }}

    steps:
      - name: Validate required secrets
        run: |
          test -n "$POSTGRES_URL"
          test -n "$BACKUP_POSTGRES_URL"

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client-17

      - name: Create SQL backup
        run: |
          mkdir -p backups
          BACKUP_FILE="backups/backup-$(date -u +%Y-%m-%dT%H-%M-%SZ).sql"

          pg_dump \
            --dbname="$POSTGRES_URL" \
            --format=plain \
            --no-owner \
            --no-privileges \
            --clean \
            --if-exists \
            --file="$BACKUP_FILE"

          echo "BACKUP_FILE=$BACKUP_FILE" >> "$GITHUB_ENV"

      - name: Reset backup database schema
        run: |
          psql "$BACKUP_POSTGRES_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DROP SCHEMA IF EXISTS public CASCADE;
          CREATE SCHEMA public;
          GRANT ALL ON SCHEMA public TO CURRENT_USER;
          GRANT ALL ON SCHEMA public TO PUBLIC;
          SQL

      - name: Restore backup into destination database
        run: psql "$BACKUP_POSTGRES_URL" -v ON_ERROR_STOP=1 -f "$BACKUP_FILE"

      - name: Upload SQL backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup
          path: backups/*.sql
          retention-days: 7
